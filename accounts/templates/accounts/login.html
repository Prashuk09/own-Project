{% extends 'base.html' %}

{% block content %}

<h3>Login</h3>
<hr>

<form method="post">

  {% csrf_token %}

  {{ form.as_p }}

  <button class="btn btn-primary w-100">
    Login
  </button>

</form>

<!-- ✅ SIGNUP LINK -->

<p class="mt-3 text-center">

  Not registered yet?
  <a href="{% url 'accounts:signup' %}">Sign Up</a>

</p>
<p class="text-center mt-2">
  <a href="{% url 'password_reset' %}">
    Forgot Password?
  </a>
</p>


{% endblock %}
