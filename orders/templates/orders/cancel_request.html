{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<h4>Cancel Order #{{ order.id }}</h4>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Reason for cancellation</label>
        <textarea name="reason"
                  class="form-control"
                  rows="4"
                  required></textarea>
    </div>

    <button class="btn btn-danger">
        Submit Cancel Request
    </button>

</form>

</div>

{% endblock %}
