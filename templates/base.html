{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>DjangoKart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

  <div class="container">

    <a class="navbar-brand fw-bold" href="/">
      🛒 DjangoKart
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto align-items-center">

        <form class="d-flex me-3" method="get" action="/">

          <input class="form-control me-2"
                type="search"
                name="q"
                placeholder="Search products...">

          <button class="btn btn-outline-light">
            🔍
          </button>

        </form>

        {% if user.is_authenticated %}

        <li class="nav-item me-2">
          <a class="btn btn-light" href="{% url 'view_cart' %}">
            🛒 {{ cart_count }}
          </a>
        </li>
    
        <li class="nav-item me-2">
          <a class="btn btn-info" href="{% url 'my_orders' %}">
            📜 Orders
          </a>
        </li>

        <li class="nav-item me-2">
          <a class="btn btn-secondary" href="{% url 'profile' %}">
            👤 Profile
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-warning" href="{% url 'logout' %}">
            Logout
          </a>
        </li>

        {% else %}

        <li class="nav-item me-2">
          <a class="btn btn-success" href="{% url 'login' %}">
            Login
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-primary" href="{% url 'signup' %}">
            Sign Up
          </a>
        </li>

        {% endif %}

      </ul>

    </div>

  </div>

</nav>


<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
